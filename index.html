<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기행문 평가기</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --background-color: #f5f7fa;
            --box-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e4e8eb;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--box-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 200px;
        }

        input[type="password"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:disabled {
            background-color: #a0c4eb;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-card {
            background-color: #f8f9fa;
            border-left: 4px solid var(--primary-color);
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .result-card h3 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 16px;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
            color: var(--primary-color);
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #888;
            font-size: 14px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>기행문 평가기 ✈️</h1>
    
    <div class="input-group">
        <label for="apiKey">Google AI Studio API Key</label>
        <input type="password" id="apiKey" placeholder="발급받은 API 키를 입력하세요">
    </div>

    <div class="input-group">
        <label for="travelogue">기행문 내용</label>
        <textarea id="travelogue" placeholder="평가받을 기행문을 여기에 작성하거나 붙여넣으세요..."></textarea>
    </div>

    <button id="submitBtn" onclick="evaluateTravelogue()">기행문 평가하기</button>
    
    <div class="loading" id="loadingIndicator">
        AI가 기행문을 열심히 분석하고 있습니다... 잠시만 기다려주세요! ⏳
    </div>

    <div class="result-section" id="resultSection">
        <h2>평가 결과</h2>
        <div class="result-card">
            <h3>📝 맞춤법 및 띄어쓰기</h3>
            <p id="resSpell"></p>
        </div>
        <div class="result-card">
            <h3>🧠 논리적 문장 구조</h3>
            <p id="resLogic"></p>
        </div>
        <div class="result-card">
            <h3>📍 여정 (언제, 어디를, 어떻게)</h3>
            <p id="resJourney"></p>
        </div>
        <div class="result-card">
            <h3>👀 견문 (보고 들은 것)</h3>
            <p id="resObservation"></p>
        </div>
        <div class="result-card">
            <h3>💡 감상 (느끼고 생각한 것)</h3>
            <p id="resImpression"></p>
        </div>
        <div class="result-card" style="border-left-color: #2ecc71; background-color: #f4fdf8;">
            <h3 style="color: #27ae60;">🌟 종합 평가</h3>
            <p id="resOverall"></p>
        </div>
    </div>

    <footer>만든이:gwond</footer>
</div>

<script>
    async function evaluateTravelogue() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const text = document.getElementById('travelogue').value.trim();
        const submitBtn = document.getElementById('submitBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const resultSection = document.getElementById('resultSection');

        if (!apiKey) {
            alert('Google AI Studio API Key를 입력해주세요.');
            return;
        }
        if (!text) {
            alert('기행문 내용을 입력해주세요.');
            return;
        }

        // UI 업데이트 (로딩 상태)
        submitBtn.disabled = true;
        loadingIndicator.style.display = 'block';
        resultSection.style.display = 'none';

        const prompt = `
당신은 전문적인 글쓰기 강사이자 기행문 평가자입니다. 다음 기행문을 꼼꼼하게 읽고 분석해주세요.
반드시 아래의 JSON 구조에 맞추어 답변해야 합니다. 마크다운 기호 없이 순수한 JSON 텍스트만 반환하세요.

{
  "spellCheck": "맞춤법, 띄어쓰기 오류 지적 및 교정 피드백",
  "logicCheck": "문맥의 흐름, 논리적인 문장 구조에 대한 평가",
  "journey": "여정(언제, 어디를, 어떻게 갔는지)이 잘 드러났는지 평가",
  "observation": "견문(새롭게 보고 들은 객관적 사실)이 생생하게 표현되었는지 평가",
  "impression": "감상(여행을 통해 느끼고 생각한 주관적 감정)이 깊이 있게 담겼는지 평가",
  "overall": "전체적인 총평 및 더 나은 기행문이 되기 위한 조언"
}

[기행문]
${text}
`;

        try {
            // Gemini 1.5 Flash 모델 사용
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }],
                    generationConfig: {
                        responseMimeType: "application/json" // JSON 응답 강제
                    }
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error?.message || 'API 호출 중 오류가 발생했습니다.');
            }

            const aiResponseText = data.candidates[0].content.parts[0].text;
            const parsedData = JSON.parse(aiResponseText);

            // 결과 화면에 적용
            document.getElementById('resSpell').innerText = parsedData.spellCheck;
            document.getElementById('resLogic').innerText = parsedData.logicCheck;
            document.getElementById('resJourney').innerText = parsedData.journey;
            document.getElementById('resObservation').innerText = parsedData.observation;
            document.getElementById('resImpression').innerText = parsedData.impression;
            document.getElementById('resOverall').innerText = parsedData.overall;

            // 결과 화면 표시
            resultSection.style.display = 'block';

        } catch (error) {
            console.error(error);
            alert('평가 중 오류가 발생했습니다.\nAPI 키가 정확한지 확인하시거나 잠시 후 다시 시도해주세요.\n\n상세 오류: ' + error.message);
        } finally {
            // UI 복구
            submitBtn.disabled = false;
            loadingIndicator.style.display = 'none';
        }
    }
</script>

</body>
</html>
